name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: Extension version
      description: Found in Settings > About
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Brave
        - Arc
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: inference
    attributes:
      label: Inference backend
      options:
        - WebGPU (in-browser)
        - Chrome Built-in AI (Gemini Nano)
        - Ollama (local)
        - Claude API
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Which mode?
      options:
        - Page mode (current page Q&A)
        - Site mode (full site RAG)
        - Document vault
        - Settings / Options
        - Onboarding
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do?
      placeholder: |
        1. Open popup on example.com
        2. Switch to Site mode
        3. Click "Crawl"
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console logs / screenshots
      description: Paste any relevant console output or attach screenshots
    validations:
      required: false
